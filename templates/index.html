<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Himanshu AI</title>
    <meta name="theme-color" content="#0a0f0d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="chat-header-left">
                <div class="avatar">
                    <svg viewBox="0 0 36 36" fill="none">
                        <circle cx="18" cy="18" r="16" fill="url(#ag)"/>
                        <path d="M18 7 C18 7, 11 14, 11 19 C11 22.9 14.1 26 18 26 C21.9 26 25 22.9 25 19 C25 14 18 7 18 7Z" fill="#fff" opacity="0.9"/>
                        <path d="M18 12 L18 22 M15 17.5 Q18 14 21 17.5" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
                        <defs><linearGradient id="ag" x1="0" y1="0" x2="36" y2="36"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#16a34a"/></linearGradient></defs>
                    </svg>
                </div>
                <div class="chat-header-info">
                    <h1>Himanshu AI</h1>
                    <span class="status-text"><span class="status-dot"></span>Online</span>
                </div>
            </div>
            <button class="clear-chat-btn" id="btn-new-chat" title="New Chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chat-area">
            <div class="message bot-message" id="welcome-msg">
                <div class="msg-avatar">🌿</div>
                <div class="msg-bubble">
                    Namaste! 🙏 Main <strong>Himanshu AI</strong> hoon.<br>
                    Fasal ki <strong>photo bhejo</strong> ya <strong>sawaal pucho</strong> — main madad karunga!
                </div>
            </div>
        </main>

        <!-- Input Bar -->
        <footer class="chat-input-bar">
            <!-- Image Preview -->
            <div class="preview-strip" id="preview-strip" style="display:none;">
                <div class="preview-wrap">
                    <img id="preview-thumb" class="preview-thumb" alt="">
                    <button class="preview-x" id="btn-remove">✕</button>
                </div>
            </div>
            <!-- Input Row -->
            <div class="input-row">
                <label class="attach-btn" for="file-input" title="Photo daalo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                    <input type="file" id="file-input" accept="image/*" hidden>
                </label>
                <input type="text" class="chat-input" id="chat-input" placeholder="Message likho..." autocomplete="off">
                <button class="send-btn" id="btn-send" title="Bhejo">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
